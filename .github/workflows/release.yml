name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - run: sudo apt-get update && sudo apt-get install -y musl-tools musl-dev

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (${TAG_VERSION}) does not match Cargo.toml version (${CARGO_VERSION})"
            exit 1
          fi

      - run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCHIVE="cvmbuild-${{ github.ref_name }}-linux-x86_64.tar.gz"
          cp target/x86_64-unknown-linux-musl/release/cvmbuild cvmbuild
          tar czf "$ARCHIVE" cvmbuild LICENSE
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "$ARCHIVE" \
            "$ARCHIVE.sha256"
